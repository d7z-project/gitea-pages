# 服务器绑定地址
bind: 127.0.0.1:18080
# 基础域名
domain: example.com
# 如果前面还有 Caddy / Nginx / ingress 等反向代理，
# 在这里声明受信任的代理出口 IP 或网段后，程序才会信任 X-Forwarded-For / X-Forwarded-Proto
trusted_proxies:
  - 127.0.0.1/32
  - 10.0.0.0/8
# 程序内部使用的 KV 存储
# KV URL 示例:
#   memory://
#   mem://
#   local:///var/lib/gitea-pages/db
#   storage:///var/lib/gitea-pages/db
#   etcd://127.0.0.1:2379?prefix=gitea-pages
#   badger:///var/lib/gitea-pages/badger?prefix=gitea-pages
db:
  url: "memory://"
# 用户脚本使用的 KV 存储，可省略；省略时回退到 db
# 同样使用上面的 KV URL 写法
user_db:
  url: ""
# 兼容旧配置：
# database:
#   url: "memory://"
# 事件总线配置，shared/version event 都走这里
# Event URL 示例:
#   memory://
#   mem://
#   etcd://127.0.0.1:2379?prefix=gitea-pages-events
event:
  url: "memory://"
# goja storage.* 脚本存储，按 repo 做隔离
# Storage URL 示例:
#   memory://
#   mem://
#   local:///var/lib/gitea-pages/storage
#   storage:///var/lib/gitea-pages/storage
#   overlay://?upperdir=local:///var/lib/gitea-pages/upper&mount=/assets::local:///srv/assets
#   s3://bucket/root/prefix?region=us-east-1&endpoint=http://127.0.0.1:9000&path_style=true&access_key=minioadmin&secret_key=minioadmin&disable_ssl=true
storage:
  url: "memory://"
provider:
  type: gitea
  gitea:
    server: https://gitea.com
    # 服务端访问 Gitea API 的 token，需要 user / org / repo 的只读权限
    token: token
    # 开启页面登录时需要这三项；三者要么都填，要么都不填
    client_id: client-id
    client_secret: client-secret
    redirect_url: https://pages.example.com/.pages/auth/callback
    # 登录时向 Gitea 请求的 OAuth scope
    scopes:
      - read:user
      - read:repository
    # 测试环境可开启 http，生产环境保持 false
    allow_insecure_http: false
auth:
  # 省略整个 auth 配置表示禁用站点登录能力
  # public repo 不走 auth；private: true 的 repo 会要求登录，并以当前用户的 repo read 权限判定是否放行
  session_ttl: 24h
  state_ttl: 5m
  authz_cache_ttl: 30s
  cookie:
    name: gitea_pages_session
    secure: true
    domain: ""
    same_site: lax
cache:
  # 元数据缓存
  # 同 db/user_db，使用 KV URL 写法
  meta: "memory://"
  # 元数据缓存时长
  meta_ttl: 1m
  # 元数据刷新间隔
  meta_refresh: 30s
  # 元数据并发刷新限制
  meta_refresh_concurrent: 16

  # 响应数据缓存
  # Cache URL 示例:
  #   memory://?max_capacity=10485760&cleanup_interval=5m
  #   mem://?max_capacity=10485760&cleanup_interval=5m
  #   redis://:password@127.0.0.1:6379/0?prefix=gitea-pages:blob:
  #   rediss://:password@redis.example.com:6379/0?prefix=gitea-pages:blob:
  blob: "memory://"
  # 响应数据缓存时长
  blob_ttl: 1m
  # 最大单个响应数据缓存大小
  blob_limit: 10MB
  # 目录列表缓存时长
  dir_ttl: 1m
  # 并发缓存写入限制
  blob_concurrent: 16
  # 404 响应缓存时长
  blob_not_found_ttl: 1h
  # 目录 404 缓存时长
  dir_not_found_ttl: 1h
  # 并发后端请求限制
  backend_concurrent: 64
page:
  # 默认页面分支
  default_branch: gh-pages
  # 默认 401 页面模板，本地文件路径；为空时使用内置模板
  401: /path/to/html.gotmpl
  # 默认 403 页面模板，本地文件路径；为空时使用内置模板
  403: /path/to/html.gotmpl
  # 默认 404 页面模板，本地文件路径；为空时使用内置模板
  404: /path/to/html.gotmpl
  # 默认 405 页面模板，本地文件路径；为空时使用内置模板
  405: /path/to/html.gotmpl
  # 默认 500 页面模板，本地文件路径；为空时使用内置模板
  500: /path/to/html.gotmpl
# 额外静态资源目录；为空表示禁用
static: ""
filters:
  # 所有 filters.* 块都支持 enabled: false 全局禁用
  reverse_proxy:
    # 设为 false 可全局禁用 reverse_proxy filter
    enabled: true
    # 是否把原始 Authorization 请求头继续转发给上游
    forward_authorization: false
    # 精确拒绝的目标主机名
    deny_hosts: []
    # 拒绝的目标 IP / CIDR；会同时匹配字面量 IP 和 DNS 解析结果
    deny_cidrs: []
  redirect:
    enabled: true
  direct:
    enabled: true
  template:
    enabled: true
  failback:
    enabled: true
  block:
    enabled: true
  "404":
    enabled: true
  js:
    # 是否允许 JS filter 输出 debug 页面
    # 仍需路由里显式设置 debug: true，且请求 URL 带 ?debug=true
    debug: true
    # 实时能力配置
    realtime:
      # shared/version event 的每个 key 在单次请求中的待处理消息上限
      event_buffer: 256
    # 请求体读取限制，0 表示不限制
    request:
      max_body_bytes: 0
    # fetch 能力限制
    fetch:
      enabled: true
      # 0 表示不限制
      max_response_body_bytes: 0
      # 留空表示不限制 host
      allowed_hosts: []
      # 开启后拒绝直连私网/环回 IP
      block_private_network: false

