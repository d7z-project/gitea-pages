# 服务器绑定地址
bind: 127.0.0.1:18080
# 基础域名
domain: example.com
# 持久化存储
database:
  # 持久化存储配置
  url: "memory://"
# 事件传递配置
event:
  url: "memory://"
provider:
  type: gitea
  gitea:
    server: https://gitea.com
    # 服务端访问 Gitea API 的 token,需要 user , org , repo 的 read 权限
    token: token
    client_id: client-id
    client_secret: client-secret
    redirect_url: https://pages.example.com/.pages/auth/callback
    scopes:
      - read:user
      - read:repository
    # 测试环境可开启 http，生产环境保持 false
    allow_insecure_http: false
auth:
  # 省略整个 auth 配置表示禁用页面鉴权；public repo 不走 auth
  # private: true 的 repo 会要求登录，并以当前用户的 repo read 权限判定是否放行
  session_ttl: 24h
  state_ttl: 5m
  authz_cache_ttl: 30s
  cookie:
    name: gitea_pages_session
    secure: true
    domain: ""
    same_site: lax
cache:
  # 元数据缓存
  meta: "memory://"
  # 元数据缓存时长
  meta_ttl: 1m
  # 元数据刷新间隔
  meta_refresh: 30s
  # 元数据并发刷新限制
  meta_refresh_concurrent: 16

  # 响应数据缓存
  blob: "memory://"
  # 响应数据缓存时长
  blob_ttl: 1m
  # 最大单个响应数据缓存大小
  blob_limit: 10MB
  # 目录列表缓存时长
  dir_ttl: 1m
  # 并发缓存写入限制
  blob_concurrent: 16
  # 404 响应缓存时长
  blob_not_found_ttl: 1h
  # 目录 404 缓存时长
  dir_not_found_ttl: 1h
  # 并发后端请求限制
  backend_concurrent: 64
page:
  # 默认页面分支
  default_branch: gh-pages
  # 默认 401 页面模板
  401: /path/to/html.gotmpl
  # 默认 403 页面模板
  403: /path/to/html.gotmpl
  # 默认 404 页面模板
  404: /path/to/html.gotmpl
  # 默认 405 页面模板
  405: /path/to/html.gotmpl
  # 默认 500 页面模板
  500: /path/to/html.gotmpl
filters:
  js:
    # 是否启用 debug 页面
    debug: true
    # 实时能力
    realtime:
      websocket: true
      sse: true
    # 请求体读取限制，0 表示不限制
    request:
      max_body_bytes: 0
    # fetch 能力限制
    fetch:
      enabled: true
      # 0 表示不限制
      max_response_body_bytes: 0
      # 留空表示不限制 host
      allowed_hosts: []
      # 开启后拒绝直连私网/环回 IP
      block_private_network: false
    # 仓库文件系统 API
    fs:
      # 是否允许脚本列目录
      enabled: true
