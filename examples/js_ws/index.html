<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Echo Example</title>
</head>
<body>
<h1>WebSocket Echo</h1>
<p>Connect, send a message, and the server will echo it back.</p>

<p id="status">Disconnected</p>

<p>
    <input id="input" type="text" placeholder="message">
    <button id="send" type="button">Send</button>
    <button id="connect" type="button">Connect</button>
    <button id="disconnect" type="button">Disconnect</button>
</p>

<pre id="messages"></pre>

<script>
    const status = document.getElementById("status");
    const input = document.getElementById("input");
    const messages = document.getElementById("messages");
    const sendButton = document.getElementById("send");
    const connectButton = document.getElementById("connect");
    const disconnectButton = document.getElementById("disconnect");

    let socket = null;

    function append(line) {
        messages.textContent += `${line}\n`;
        messages.scrollTop = messages.scrollHeight;
    }

    function connect() {
        if (socket) {
            return;
        }
        const protocol = location.protocol === "https:" ? "wss:" : "ws:";
        socket = new WebSocket(`${protocol}//${location.host}/ws`);

        socket.onopen = () => {
            status.textContent = "Connected";
            append("[system] connected");
        };

        socket.onmessage = (event) => {
            append(`[recv] ${event.data}`);
        };

        socket.onclose = () => {
            status.textContent = "Disconnected";
            append("[system] disconnected");
            socket = null;
        };

        socket.onerror = () => {
            status.textContent = "Error";
            append("[system] websocket error");
        };
    }

    function disconnect() {
        if (socket) {
            socket.close();
        }
    }

    function send() {
        const message = input.value.trim();
        if (!message || !socket || socket.readyState !== WebSocket.OPEN) {
            return;
        }
        append(`[send] ${message}`);
        socket.send(message);
        input.value = "";
    }

    connectButton.addEventListener("click", connect);
    disconnectButton.addEventListener("click", disconnect);
    sendButton.addEventListener("click", send);
    input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            send();
        }
    });
</script>
</body>
</html>
