<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Event Example</title>
</head>
<body>
<h1>WebSocket Broadcast</h1>
<p>两个浏览器窗口连接后，发送的消息会通过 <code>event.put/load</code> 广播给所有在线连接。</p>

<p>
    <label for="name">Name:</label>
    <input id="name" type="text" value="">
    <button id="connect" type="button">Connect</button>
    <button id="disconnect" type="button" disabled>Disconnect</button>
</p>

<p id="status">Disconnected</p>

<p>
    <input id="message" type="text" placeholder="message" disabled>
    <button id="send" type="button" disabled>Send</button>
</p>

<pre id="messages"></pre>

<script>
    const nameInput = document.getElementById("name");
    const connectButton = document.getElementById("connect");
    const disconnectButton = document.getElementById("disconnect");
    const messageInput = document.getElementById("message");
    const sendButton = document.getElementById("send");
    const status = document.getElementById("status");
    const messages = document.getElementById("messages");

    let socket = null;

    nameInput.value = String(Math.floor(1000 + Math.random() * 9000));

    function append(line) {
        messages.textContent += `${line}\n`;
        messages.scrollTop = messages.scrollHeight;
    }

    function setConnected(connected) {
        connectButton.disabled = connected;
        disconnectButton.disabled = !connected;
        nameInput.disabled = connected;
        messageInput.disabled = !connected;
        sendButton.disabled = !connected;
    }

    function connect() {
        const name = nameInput.value.trim();
        if (!name || socket) {
            return;
        }

        socket = new WebSocket(`/event?name=${encodeURIComponent(name)}`);
        status.textContent = "Connecting";

        socket.onopen = () => {
            status.textContent = "Connected";
            setConnected(true);
            append(`[system] connected as ${name}`);
        };

        socket.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                append(`[${data.name}] ${data.data}`);
            } catch {
                append(`[raw] ${event.data}`);
            }
        };

        socket.onclose = () => {
            status.textContent = "Disconnected";
            setConnected(false);
            append("[system] disconnected");
            socket = null;
        };

        socket.onerror = () => {
            status.textContent = "Error";
            append("[system] websocket error");
        };
    }

    function disconnect() {
        if (socket) {
            socket.close();
        }
    }

    function send() {
        const message = messageInput.value.trim();
        if (!message || !socket || socket.readyState !== WebSocket.OPEN) {
            return;
        }
        socket.send(message);
        messageInput.value = "";
    }

    connectButton.addEventListener("click", connect);
    disconnectButton.addEventListener("click", disconnect);
    sendButton.addEventListener("click", send);
    messageInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
            send();
        }
    });
</script>
</body>
</html>
